name: FairNest
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    TARGETED_DEVICE_FAMILY: "1"
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    SWIFT_STRICT_CONCURRENCY: targeted
    SWIFT_TREAT_WARNINGS_AS_ERRORS: "YES"
packages: {}
targets:
  FairNest:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - Shared
      - FairNest
    resources:
      - FairNest/Resources
    entitlements:
      path: FairNest/Supporting/FairNest.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.hardikpakhale.fairnest
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.security.application-groups:
          - group.com.hardikpakhale.fairnest
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hardikpakhale.fairnest
        PRODUCT_NAME: FairNest
        INFOPLIST_FILE: FairNest/Supporting/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: DUHVN68KBA
    info:
      path: FairNest/Supporting/Info.plist
      properties:
        CFBundleDisplayName: FairNest
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundlePackageType: APPL
        LSRequiresIPhoneOS: true
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CKSharingSupported: true
        ITSAppUsesNonExemptEncryption: false
        FairNestCloudKitContainerIdentifier: iCloud.com.hardikpakhale.fairnest
        FairNestAppGroupIdentifier: group.com.hardikpakhale.fairnest
    dependencies:
      - target: FairNestWidgets
        embed: true
  FairNestWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - Shared/Models
      - Shared/WidgetSupport
      - FairNestWidgets
    resources:
      - FairNestWidgets/Supporting/PrivacyInfo.xcprivacy
    entitlements:
      path: FairNestWidgets/Supporting/FairNestWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.hardikpakhale.fairnest
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hardikpakhale.fairnest.widgets
        PRODUCT_NAME: FairNestWidgets
        INFOPLIST_FILE: FairNestWidgets/Supporting/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: DUHVN68KBA
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: FairNestWidgets/Supporting/Info.plist
      properties:
        CFBundleDisplayName: FairNest
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        FairNestAppGroupIdentifier: group.com.hardikpakhale.fairnest
  FairNestTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - FairNestTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hardikpakhale.fairnest.tests
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - target: FairNest
  FairNestUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - FairNestUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hardikpakhale.fairnest.uitests
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - target: FairNest
schemes:
  FairNest:
    build:
      targets:
        FairNest: all
        FairNestWidgets: all
        FairNestTests: [test]
        FairNestUITests: [test]
    test:
      gatherCoverageData: true
      targets:
        - name: FairNestTests
        - name: FairNestUITests
